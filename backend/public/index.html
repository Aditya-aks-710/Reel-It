<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reel Downloader</title>
    <style>
      :root {
        --bg1: #0b0d12;
        --bg2: #141826;
        --card: rgba(26, 29, 36, 0.72);
        --stroke: #2c313c;
        --accent: #e1306c;
        --accent2: #c13584;
        --accent3: #f77737;
        --text: #f5f6f8;
        --muted: #9aa1ad;
        --ok: #51cf66;
        --err: #ff6b6b;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 20px;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: var(--text);
        background:
          radial-gradient(1200px 600px at 10% -10%, #2a1530 0%, transparent 55%),
          radial-gradient(1000px 500px at 110% 10%, #15263a 0%, transparent 50%),
          linear-gradient(160deg, var(--bg1), var(--bg2));
      }
      .card {
        width: min(94vw, 480px);
        background: var(--card);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(255, 255, 255, 0.06);
        padding: 26px;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        animation: rise 0.45s ease both;
      }
      @keyframes rise {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: none; }
      }
      .brand {
        display: flex; align-items: center; gap: 10px; margin-bottom: 4px;
      }
      .logo {
        width: 34px; height: 34px; border-radius: 10px; flex: none;
        background: linear-gradient(135deg, var(--accent3), var(--accent), var(--accent2));
        display: grid; place-items: center; font-size: 18px;
      }
      h1 { margin: 0; font-size: 1.35rem; letter-spacing: -0.01em; }
      p.sub { margin: 6px 0 18px; color: var(--muted); font-size: 0.88rem; }

      .field { position: relative; display: flex; gap: 8px; }
      input {
        flex: 1; min-width: 0;
        padding: 13px 14px;
        border-radius: 12px;
        border: 1px solid var(--stroke);
        background: #11141a;
        color: var(--text);
        font-size: 0.95rem;
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(225, 48, 108, 0.18);
      }
      .icon-btn {
        flex: none;
        width: 44px;
        border-radius: 12px;
        border: 1px solid var(--stroke);
        background: #11141a;
        color: var(--muted);
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.15s, color 0.15s, border-color 0.15s;
      }
      .icon-btn:hover { color: var(--text); border-color: var(--accent); }

      .actions { display: flex; gap: 10px; margin-top: 12px; }
      button.primary, button.ghost {
        flex: 1;
        padding: 13px 14px;
        border: none;
        border-radius: 12px;
        font-size: 0.98rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.08s, filter 0.15s, opacity 0.15s;
      }
      button.primary {
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: #fff;
      }
      button.ghost {
        background: #11141a;
        border: 1px solid var(--stroke);
        color: var(--text);
      }
      button.primary:hover, button.ghost:hover { filter: brightness(1.08); }
      button:active { transform: translateY(1px); }
      button:disabled { opacity: 0.55; cursor: not-allowed; filter: none; }

      .result { margin-top: 18px; display: none; animation: rise 0.35s ease both; }
      .result.show { display: block; }
      video {
        width: 100%;
        border-radius: 14px;
        background: #000;
        max-height: 420px;
        display: block;
      }
      .meta { display: flex; gap: 10px; align-items: center; margin-top: 12px; }
      .meta img {
        width: 40px; height: 40px; border-radius: 50%;
        object-fit: cover; background: #11141a; flex: none;
      }
      .meta .who { min-width: 0; }
      .meta .user { font-weight: 600; font-size: 0.9rem; }
      .meta .cap {
        color: var(--muted); font-size: 0.8rem; margin-top: 2px;
        display: -webkit-box; -webkit-line-clamp: 2;
        -webkit-box-orient: vertical; overflow: hidden;
      }

      .result .actions { margin-top: 14px; }

      .progress {
        margin-top: 14px; height: 8px; border-radius: 999px;
        background: #11141a; overflow: hidden; display: none;
      }
      .progress.show { display: block; }
      .progress > span {
        display: block; height: 100%; width: 0%;
        background: linear-gradient(90deg, var(--accent3), var(--accent));
        transition: width 0.15s ease;
      }

      .status { margin-top: 14px; font-size: 0.88rem; min-height: 1.2em; }
      .status.error { color: var(--err); }
      .status.ok { color: var(--ok); }
      .status.muted { color: var(--muted); }

      .spinner {
        display: inline-block; width: 14px; height: 14px;
        border: 2px solid #ffffff55; border-top-color: #fff;
        border-radius: 50%; animation: spin 0.7s linear infinite;
        vertical-align: -2px; margin-right: 6px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      footer {
        margin-top: 18px; font-size: 0.72rem; color: var(--muted);
        text-align: center; line-height: 1.5;
      }

      @media (max-width: 420px) {
        .actions { flex-direction: column; }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand">
        <div class="logo">▶</div>
        <h1>Reel Downloader</h1>
      </div>
      <p class="sub">Paste a public Instagram reel link to preview and download it.</p>

      <div class="field">
        <input
          id="url"
          type="url"
          placeholder="https://www.instagram.com/reel/XXXXXXXXX/"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="icon-btn" id="pasteBtn" title="Paste from clipboard">📋</button>
        <button class="icon-btn" id="clearBtn" title="Clear">✕</button>
      </div>

      <div class="actions">
        <button class="primary" id="findBtn">Find video</button>
      </div>

      <section class="result" id="result">
        <video id="player" controls preload="metadata" playsinline></video>
        <div class="meta">
          <img id="avatar" alt="" />
          <div class="who">
            <div class="user" id="user"></div>
            <div class="cap" id="cap"></div>
          </div>
        </div>
        <div class="actions">
          <button class="primary" id="downloadBtn">⬇ Download</button>
          <button class="ghost" id="saveBtn">💾 Save to server</button>
        </div>
        <div class="progress" id="progress"><span id="bar"></span></div>
      </section>

      <div id="status" class="status"></div>

      <footer>
        For personal/educational use. Only download content you own or have
        permission to use.
      </footer>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      const urlInput = $('url');
      const findBtn = $('findBtn');
      const pasteBtn = $('pasteBtn');
      const clearBtn = $('clearBtn');
      const result = $('result');
      const player = $('player');
      const avatar = $('avatar');
      const userEl = $('user');
      const capEl = $('cap');
      const downloadBtn = $('downloadBtn');
      const saveBtn = $('saveBtn');
      const progress = $('progress');
      const bar = $('bar');
      const status = $('status');

      let current = null; // last resolved reel data

      function setStatus(msg, type = '') {
        status.innerHTML = msg;
        status.className = 'status' + (type ? ' ' + type : '');
      }
      function setProgress(pct) {
        if (pct == null) { progress.classList.remove('show'); bar.style.width = '0%'; return; }
        progress.classList.add('show');
        bar.style.width = Math.max(0, Math.min(100, pct)) + '%';
      }
      function hideResult() {
        result.classList.remove('show');
        player.removeAttribute('src');
        player.load();
        current = null;
      }

      // --- Paste / clear conveniences ---
      pasteBtn.addEventListener('click', async () => {
        try {
          const text = await navigator.clipboard.readText();
          if (text) { urlInput.value = text.trim(); urlInput.focus(); }
        } catch {
          setStatus('Clipboard blocked — paste manually with Ctrl+V.', 'muted');
        }
      });
      clearBtn.addEventListener('click', () => {
        urlInput.value = '';
        hideResult();
        setStatus('');
        urlInput.focus();
      });
      urlInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') findBtn.click();
      });

      // --- Find / resolve + inline preview ---
      findBtn.addEventListener('click', async () => {
        const url = urlInput.value.trim();
        hideResult();
        setProgress(null);
        if (!url) { setStatus('Please paste a reel link first.', 'error'); return; }

        findBtn.disabled = true;
        setStatus('<span class="spinner"></span>Finding video…', 'ok');

        try {
          const res = await fetch('/api/resolve', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url }),
          });
          const data = await res.json();
          if (!res.ok || !data.success) {
            throw new Error(data.error || 'Could not resolve that reel.');
          }

          current = { url, ...data };
          // Stream the video through our server so it plays inline reliably.
          player.src = '/api/download?inline=1&url=' + encodeURIComponent(url);
          if (data.thumbnail) { avatar.src = data.thumbnail; avatar.style.display = ''; }
          else { avatar.style.display = 'none'; }
          userEl.textContent = data.username ? '@' + data.username : 'Instagram reel';
          capEl.textContent = data.caption || '';
          result.classList.add('show');
          setStatus('Video found. Play it, then download or save.', 'ok');
        } catch (err) {
          setStatus(err.message, 'error');
        } finally {
          findBtn.disabled = false;
        }
      });

      // --- Download with progress (fetch + stream to a Blob) ---
      downloadBtn.addEventListener('click', async () => {
        if (!current) return;
        const url = current.url;
        downloadBtn.disabled = true;
        saveBtn.disabled = true;
        setStatus('<span class="spinner"></span>Downloading…', 'ok');
        setProgress(0);

        try {
          const res = await fetch('/api/download?url=' + encodeURIComponent(url));
          if (!res.ok) {
            let msg = 'Download failed.';
            try { msg = (await res.json()).error || msg; } catch {}
            throw new Error(msg);
          }
          const total = Number(res.headers.get('Content-Length')) || 0;
          const reader = res.body.getReader();
          const chunks = [];
          let received = 0;
          for (;;) {
            const { done, value } = await reader.read();
            if (done) break;
            chunks.push(value);
            received += value.length;
            if (total) setProgress((received / total) * 100);
          }
          setProgress(100);
          const blob = new Blob(chunks, { type: 'video/mp4' });
          const objUrl = URL.createObjectURL(blob);
          const a = document.createElement('a');
          const m = url.match(/\/(reel|reels|p|tv)\/([A-Za-z0-9_-]+)/i);
          a.href = objUrl;
          a.download = 'reel-' + (m ? m[2] : Date.now()) + '.mp4';
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(objUrl);
          setStatus('Saved to your device ✓', 'ok');
        } catch (err) {
          setStatus(err.message, 'error');
        } finally {
          downloadBtn.disabled = false;
          saveBtn.disabled = false;
          setTimeout(() => setProgress(null), 800);
        }
      });

      // --- Save to the server's downloads/ folder ---
      saveBtn.addEventListener('click', async () => {
        if (!current) return;
        downloadBtn.disabled = true;
        saveBtn.disabled = true;
        setStatus('<span class="spinner"></span>Saving on server…', 'ok');
        try {
          const res = await fetch('/api/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: current.url }),
          });
          const data = await res.json();
          if (!res.ok || !data.success) {
            throw new Error(data.error || 'Save failed.');
          }
          const kb = data.bytes ? ' (' + Math.round(data.bytes / 1024) + ' KB)' : '';
          setStatus('Saved on server: ' + data.filename + kb, 'ok');
        } catch (err) {
          setStatus(err.message, 'error');
        } finally {
          downloadBtn.disabled = false;
          saveBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
